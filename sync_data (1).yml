        run: |
          python3 << 'EOF'
          import requests, csv, gzip, shutil, os, json, time, base64, io
          from io import StringIO
          from datetime import datetime, timezone
          from requests.adapters import HTTPAdapter
          from urllib3.util.retry import Retry

          METABASE_URL     = "https://metabase-lighthouse.solarsquare.in"
          USERNAME         = "devika.g@solarsquare.in"
          PASSWORD         = "Metabasedevika123"
          OMS_CARD_ID      = 2154
          DN_CARD_ID       = 2106
          RATE_545_NON_DCR = 8134.52
          RATE_540_DCR     = 12065.00
          ERP_B64          = os.environ.get("ERP_B64", "")

          OMS_COLS = {
              "SSE ID":"SSE ID","Installation Completion Date":"Installation Completion Date",
              "Cell Name":"Cell Name","City":"City","State":"State",
              "Project Size (kW)":"Project Size (kW)","Offer Type":"Offer Type",
              "Phase Connection":"Phase Connection","Final Revenue":"Final Revenue",
              "Final Revenue Excl. GST":"Final Revenue Excl. GST",
          }

          DN_COLS = {'customer': 'DN_SSE_ID', 'posting_date': 'posting_date', 'parent': 'parent', 'item_code': 'item_code', 'item_name': 'item_name', 'item_category': 'item_category', 'item_subcategory': 'item_subcategory', 'set_warehouse': 'set_warehouse', 'warehouse': 'warehouse', 'qty': 'qty', 'uohm': 'uom', 'rate': 'rate', 'amount': 'amount', 'Vehicle No': 'Vehicle No', 'Reason for Second Delivery': 'Reason for Second Delivery', 'Text Remarks for Second Dispatch': 'Text Remarks for Second Dispatch', 'Delivery Note Status': 'Delivery Note Status'}

          FINAL_HEADERS = ['SSE ID', 'Installation Completion Date', 'Cell Name', 'City', 'State', 'Project Size (kW)', 'Offer Type', 'Phase Connection', 'Final Revenue', 'Final Revenue Excl. GST', 'posting_date', 'item_code', 'item_name', 'item_category', 'item_subcategory', 'set_warehouse', 'warehouse', 'qty', 'uom', 'rate', 'amount', 'parent', 'Delivery Note Status', 'Vehicle No', 'Reason for Second Delivery', 'Text Remarks for Second Dispatch']

          def make_http():
              s = requests.Session()
              s.mount("https://", HTTPAdapter(max_retries=Retry(
                  total=3, backoff_factor=30, status_forcelist=[502,503,504],
                  allowed_methods=["POST"])))
              return s

          def get_session(http):
              r = http.post(f"{METABASE_URL}/api/session",
                            json={"username":USERNAME,"password":PASSWORD},timeout=60)
              r.raise_for_status(); return r.json()["id"]

          def fetch_csv(http, sid, cid, label="data"):
              for attempt in range(3):
                  try:
                      print(f"  [{label}] Attempt {attempt+1}/3 ...")
                      r = http.post(f"{METABASE_URL}/api/card/{cid}/query/csv",
                                    headers={"X-Metabase-Session":sid},timeout=600)
                      r.raise_for_status()
                      print(f"  [{label}] OK {len(r.text):,} chars | cols: {r.text.split(chr(10))[0][:300]}")
                      return r.text
                  except Exception as e:
                      print(f"  [{label}] Error: {e}")
                      if attempt==2: raise
                      time.sleep(60*(attempt+1))

          def slim(row, col_map):
              return {new:str(row.get(old,"")).strip() for old,new in col_map.items()}

          # ERP lookup — fills blank item_category/subcategory from embedded CSV
          code_lookup, name_lookup = {}, {}
          if ERP_B64.strip():
              try:
                  raw_csv = gzip.decompress(base64.b64decode(ERP_B64.strip())).decode("utf-8")
                  for row in csv.DictReader(io.StringIO(raw_csv)):
                      code = row.get("Item Code","").strip()
                      name = row.get("Item Name","").strip()
                      cat  = row.get("Item category","").strip()
                      sub  = row.get("Item Sub-Category","").strip()
                      grp  = row.get("Item Group","").strip()
                      entry = {"item_category":cat if cat else grp,
                               "item_subcategory":sub if sub else grp}
                      if code: code_lookup[code.upper()] = entry
                      if name:
                          nk = name.lower()
                          if nk not in name_lookup or (code and not name_lookup[nk].get("_code","")):
                              name_lookup[nk] = entry
                  print(f"ERP loaded: {len(code_lookup):,} codes, {len(name_lookup):,} names")
              except Exception as e:
                  print(f"WARNING ERP load failed: {e}")

          def enrich(row):
              code = row.get("item_code","").strip()
              name = row.get("item_name","").strip()
              if not row.get("item_category","").strip():
                  erp = code_lookup.get(code.upper()) if code else None
                  if erp is None and name: erp = name_lookup.get(name.lower())
                  if erp:
                      row["item_category"]    = erp["item_category"]
                      row["item_subcategory"] = erp.get("item_subcategory","")
              try:
                  q = float(row.get("qty","") or 0)
                  n = row.get("item_name","")
                  if "545 Wp Mono Bifacial Non DCR-PREMIER" in n:
                      row["rate"] = str(RATE_545_NON_DCR)
                      row["amount"] = str(round(q*RATE_545_NON_DCR,2))
                  elif "540 Wp Mono Bifacial DCR-PREMIER" in n:
                      row["rate"] = str(RATE_540_DCR)
                      row["amount"] = str(round(q*RATE_540_DCR,2))
              except Exception: pass
              return row

          http    = make_http()
          session = get_session(http)
          print("Fetching OMS ..."); raw_oms = fetch_csv(http,session,OMS_CARD_ID,label="OMS")
          print("Fetching DN ...");  raw_dn  = fetch_csv(http,session,DN_CARD_ID, label="DN")

          dn_raw   = list(csv.DictReader(StringIO(raw_dn)))
          oms_rows = [slim(r,OMS_COLS) for r in csv.DictReader(StringIO(raw_oms))]
          dn_rows  = [enrich(slim(r,DN_COLS)) for r in dn_raw]
          print(f"OMS:{len(oms_rows):,}  DN lines:{len(dn_rows):,}")

          if dn_rows:
              s = dn_rows[0]
              print("DN first row (enriched):")
              for k in ["DN_SSE_ID","item_code","item_name","item_category","item_subcategory","qty","rate","amount","warehouse"]:
                  print(f"  {k}: {str(s.get(k,'<missing>'))[:70]!r}")

          valid_ids = {r["SSE ID"].upper() for r in oms_rows if r["SSE ID"].strip()}
          dn_lkp, skipped = {}, 0
          for row in dn_rows:
              k = row["DN_SSE_ID"].upper()
              if k in valid_ids: dn_lkp.setdefault(k,[]).append(row)
              else: skipped += 1
          print(f"DN matched:{sum(len(v) for v in dn_lkp.values()):,}  unmatched:{skipped:,}")

          merged, no_dn = [], 0
          for oms in oms_rows:
              k     = oms["SSE ID"].upper()
              items = dn_lkp.get(k,[])
              if not items:
                  merged.append({h:oms.get(h,"") for h in FINAL_HEADERS}); no_dn+=1
              else:
                  for dn in items:
                      row = {h:oms.get(h,"") for h in FINAL_HEADERS}
                      for col in DN_COLS.values():
                          if col in FINAL_HEADERS: row[col]=dn.get(col,"")
                      merged.append(row)
          print(f"Merged:{len(merged):,}  OMS-no-DN:{no_dn:,}")

          TMP="/tmp/data_tmp.csv"; GZ="data.csv.gz"; META="data_meta.json"
          with open(TMP,"w",newline="",encoding="utf-8") as f:
              w=csv.DictWriter(f,fieldnames=FINAL_HEADERS,extrasaction="ignore")
              w.writeheader(); w.writerows(merged)
          with open(TMP,"rb") as fi, gzip.open(GZ,"wb",compresslevel=9) as fo:
              shutil.copyfileobj(fi,fo)
          with open(META,"w") as f:
              json.dump({"last_updated":datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
                         "total_rows":len(merged),"oms_rows":len(oms_rows),
                         "dn_rows":len(dn_rows),"oms_no_dn":no_dn},f,indent=2)
          print("Done")
          EOF

      - name: Generate projects JSON
        run: |
          python3 generate_projects_json.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.csv.gz data_meta.json projects.json.gz
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push origin main
